<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadFlare</title>
    <meta name="theme-color" content="#F49500">
    <meta property="og:title" content="RoadFlare — View Profile">
    <meta property="og:description" content="Rides from people you trust. Built on Nostr.">
    <meta property="og:url" content="https://roadflare.app">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
    <style>
        :root {
            --orange: #F49500;
            --orange-light: #FFB84D;
            --orange-glow: rgba(244, 149, 0, 0.15);
            --bg: #0A0A0A;
            --bg-card: #141414;
            --bg-card-hover: #1A1A1A;
            --text: #F5F5F5;
            --text-muted: #888;
            --text-dim: #555;
            --border: #222;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header a {
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
        }
        .header a span { color: var(--orange); }
        .header a .road { color: var(--text); }

        /* Profile card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }
        .card-banner {
            height: 100px;
            background: linear-gradient(135deg, rgba(244,149,0,0.15) 0%, rgba(244,149,0,0.05) 100%);
            background-size: cover;
            background-position: center;
        }
        .card-body {
            padding: 0 1.5rem 1.5rem;
            margin-top: -36px;
        }
        .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--bg);
            border: 3px solid var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin-bottom: 0.75rem;
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .avatar-placeholder {
            font-size: 28px;
            color: var(--orange);
        }
        .profile-name {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }
        .profile-npub {
            font-size: 0.75rem;
            color: var(--text-dim);
            font-family: 'SF Mono', 'Menlo', monospace;
            word-break: break-all;
            margin-top: 0.25rem;
        }
        .profile-about {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 0.75rem;
        }
        .profile-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 100px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-top: 0.75rem;
        }
        .type-driver {
            color: var(--orange);
            border: 1px solid rgba(244, 149, 0, 0.3);
            background: rgba(244, 149, 0, 0.08);
        }
        .type-rider {
            color: #4FC3F7;
            border: 1px solid rgba(79, 195, 247, 0.3);
            background: rgba(79, 195, 247, 0.08);
        }
        .vehicle-info {
            margin-top: 1rem;
            padding: 0.75rem 1rem;
            background: rgba(244, 149, 0, 0.06);
            border: 1px solid rgba(244, 149, 0, 0.12);
            border-radius: 10px;
        }
        .vehicle-label {
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }
        .vehicle-value {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text);
        }

        /* QR section */
        .qr-section {
            margin-top: 1.5rem;
            text-align: center;
        }
        .qr-section canvas {
            border-radius: 12px;
        }
        .qr-label {
            font-size: 0.75rem;
            color: var(--text-dim);
            margin-top: 0.5rem;
        }

        /* Action buttons */
        .actions {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.85rem 1.5rem;
            border-radius: 12px;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.2s ease;
            border: none;
            cursor: pointer;
        }
        .btn-primary {
            background: var(--orange);
            color: #000;
        }
        .btn-primary:hover {
            background: var(--orange-light);
            transform: translateY(-1px);
        }
        .btn-secondary {
            background: var(--bg-card);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover {
            background: var(--bg-card-hover);
            border-color: var(--text-dim);
        }
        .store-buttons {
            display: flex;
            gap: 0.75rem;
        }
        .store-buttons .btn { flex: 1; font-size: 0.85rem; }

        /* Loading skeleton */
        .skeleton {
            animation: pulse 1.5s ease-in-out infinite;
        }
        .skeleton-line {
            height: 1rem;
            background: var(--border);
            border-radius: 6px;
            margin-bottom: 0.5rem;
        }
        .skeleton-line.short { width: 60%; }
        .skeleton-line.medium { width: 80%; }
        .skeleton-avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--border);
            margin-bottom: 0.75rem;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* Error / 404 */
        .error-page, .not-found {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            filter: drop-shadow(0 0 20px rgba(244, 149, 0, 0.3));
        }
        .error-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .error-msg {
            color: var(--text-muted);
            font-size: 0.95rem;
            max-width: 300px;
            margin-bottom: 1.5rem;
        }

        /* Footer */
        footer {
            padding: 2rem;
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 0.8rem;
        }
        footer a {
            color: var(--text-muted);
            text-decoration: none;
        }
        footer a:hover { color: var(--orange); }

        /* Hide sections */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="/"><span class="road">Road</span><span>Flare</span></a>
    </div>

    <!-- Share profile page -->
    <div id="share-page" class="hidden">
        <!-- Loading state -->
        <div id="loading" class="card">
            <div class="card-banner"></div>
            <div class="card-body skeleton">
                <div class="skeleton-avatar"></div>
                <div class="skeleton-line short"></div>
                <div class="skeleton-line medium"></div>
            </div>
        </div>

        <!-- Loaded profile -->
        <div id="profile" class="hidden">
            <div class="card">
                <div class="card-banner" id="profile-banner"></div>
                <div class="card-body">
                    <div class="avatar" id="profile-avatar">
                        <span class="avatar-placeholder">&#x1F464;</span>
                    </div>
                    <div class="profile-name" id="profile-name"></div>
                    <div class="profile-npub" id="profile-npub"></div>
                    <span class="profile-type" id="profile-type"></span>
                    <div class="profile-about hidden" id="profile-about"></div>
                    <div class="vehicle-info hidden" id="vehicle-info">
                        <div class="vehicle-label">Vehicle</div>
                        <div class="vehicle-value" id="vehicle-value"></div>
                    </div>
                </div>
            </div>

            <div class="qr-section">
                <canvas id="qr-canvas" width="160" height="160"></canvas>
                <div class="qr-label">Scan to view this profile</div>
            </div>

            <div class="actions">
                <a class="btn btn-primary" id="add-btn" href="#">Add to RoadFlare</a>
                <div class="store-buttons">
                    <a class="btn btn-secondary" id="appstore-btn" href="#">App Store</a>
                    <a class="btn btn-secondary" id="playstore-btn" href="#">Google Play</a>
                </div>
            </div>
        </div>

        <!-- Error state -->
        <div id="error" class="hidden error-page">
            <div class="error-icon">&#x26A0;&#xFE0F;</div>
            <div class="error-title" id="error-title">Profile not found</div>
            <div class="error-msg" id="error-msg"></div>
            <a href="/" class="btn btn-secondary">Go to RoadFlare</a>
        </div>
    </div>

    <!-- 404 page (non-share URLs) -->
    <div id="not-found" class="hidden not-found">
        <div class="error-icon">&#x1F525;</div>
        <div class="error-title">Page not found</div>
        <div class="error-msg">The page you're looking for doesn't exist.</div>
        <a href="/" class="btn btn-primary">Go to RoadFlare</a>
    </div>
</div>

<footer>
    <a href="/">RoadFlare</a> &middot;
    <a href="/terms">Terms</a> &middot;
    <a href="/privacy">Privacy</a> &middot;
    <a href="https://github.com/variablefate/roadflare-ios">Source</a>
</footer>

<script>
// ============================================================
// Bech32 Decoder (BIP-173 / NIP-19)
// ============================================================
const BECH32_CHARSET = 'qpzry9x8gf2tvdw0s3jn54khce6mua7l';

function bech32Polymod(values) {
    const GEN = [0x3b6a57b2, 0x26508e6d, 0x1ea119fa, 0x3d4233dd, 0x2a1462b3];
    let chk = 1;
    for (const v of values) {
        const b = chk >> 25;
        chk = ((chk & 0x1ffffff) << 5) ^ v;
        for (let i = 0; i < 5; i++) {
            if ((b >> i) & 1) chk ^= GEN[i];
        }
    }
    return chk;
}

function bech32HrpExpand(hrp) {
    const ret = [];
    for (let i = 0; i < hrp.length; i++) ret.push(hrp.charCodeAt(i) >> 5);
    ret.push(0);
    for (let i = 0; i < hrp.length; i++) ret.push(hrp.charCodeAt(i) & 31);
    return ret;
}

function bech32Decode(str) {
    str = str.toLowerCase();
    const pos = str.lastIndexOf('1');
    if (pos < 1 || pos + 7 > str.length || str.length > 90) return null;
    const hrp = str.slice(0, pos);
    const dataChars = str.slice(pos + 1);
    const data = [];
    for (const c of dataChars) {
        const idx = BECH32_CHARSET.indexOf(c);
        if (idx === -1) return null;
        data.push(idx);
    }
    if (bech32Polymod(bech32HrpExpand(hrp).concat(data)) !== 1) return null;
    return { hrp, data: data.slice(0, -6) };
}

function convertBits(data, fromBits, toBits, pad) {
    let acc = 0, bits = 0;
    const ret = [];
    const maxv = (1 << toBits) - 1;
    for (const v of data) {
        acc = (acc << fromBits) | v;
        bits += fromBits;
        while (bits >= toBits) {
            bits -= toBits;
            ret.push((acc >> bits) & maxv);
        }
    }
    if (pad && bits > 0) ret.push((acc << (toBits - bits)) & maxv);
    return ret;
}

function npubToHex(npub) {
    const decoded = bech32Decode(npub);
    if (!decoded || decoded.hrp !== 'npub') return null;
    const bytes = convertBits(decoded.data, 5, 8, false);
    if (bytes.length !== 32) return null;
    return bytes.map(b => b.toString(16).padStart(2, '0')).join('');
}

// ============================================================
// NIP-01 Relay Client
// ============================================================
const DEFAULT_RELAYS = [
    'wss://relay.damus.io',
    'wss://nos.lol',
    'wss://relay.primal.net'
];
const TIMEOUT_MS = 8000;

function fetchKind0(hexPubkey) {
    return new Promise((resolve) => {
        let resolved = false;
        const sockets = [];
        const subId = 'rf_' + Math.random().toString(36).slice(2, 10);

        const cleanup = () => {
            resolved = true;
            for (const ws of sockets) {
                try {
                    ws.send(JSON.stringify(['CLOSE', subId]));
                    ws.close();
                } catch (_) {}
            }
        };

        const timer = setTimeout(() => {
            if (!resolved) { cleanup(); resolve(null); }
        }, TIMEOUT_MS);

        for (const url of DEFAULT_RELAYS) {
            try {
                const ws = new WebSocket(url);
                sockets.push(ws);

                ws.onopen = () => {
                    ws.send(JSON.stringify([
                        'REQ', subId,
                        { kinds: [0], authors: [hexPubkey], limit: 1 }
                    ]));
                };

                ws.onmessage = (msg) => {
                    if (resolved) return;
                    try {
                        const data = JSON.parse(msg.data);
                        if (data[0] === 'EVENT' && data[1] === subId && data[2]) {
                            const event = data[2];
                            if (event.kind === 0 && event.content) {
                                clearTimeout(timer);
                                cleanup();
                                resolve(JSON.parse(event.content));
                            }
                        }
                    } catch (_) {}
                };

                ws.onerror = () => {};
                ws.onclose = () => {};
            } catch (_) {}
        }
    });
}

// ============================================================
// QR Code Generator (minimal, alphanumeric, Level M)
// ============================================================
function generateQR(text, canvas, size) {
    // Use a simple approach: encode data into a QR matrix
    // For URLs, we use a compact encoding via the qr-creator algorithm
    const modules = qrEncode(text);
    if (!modules) return;
    const ctx = canvas.getContext('2d');
    const scale = size / modules.length;
    canvas.width = size;
    canvas.height = size;

    // Background
    ctx.fillStyle = '#141414';
    ctx.fillRect(0, 0, size, size);

    // Modules
    ctx.fillStyle = '#F49500';
    for (let y = 0; y < modules.length; y++) {
        for (let x = 0; x < modules[y].length; x++) {
            if (modules[y][x]) {
                ctx.fillRect(
                    Math.round(x * scale),
                    Math.round(y * scale),
                    Math.ceil(scale),
                    Math.ceil(scale)
                );
            }
        }
    }
}

// Minimal QR encoder - byte mode, ECC level M
function qrEncode(text) {
    const data = new TextEncoder().encode(text);
    // Pick version based on data length (byte mode, ECC M)
    // Version capacities for byte mode, ECC M:
    const caps = [0,16,28,44,64,86,108,124,154,182,216,254,290,334,365,415,453,507,563,627,669];
    let ver = 0;
    for (let v = 1; v <= 20; v++) {
        if (data.length <= caps[v]) { ver = v; break; }
    }
    if (ver === 0) return null;

    const size = ver * 4 + 17;
    const matrix = Array.from({length: size}, () => Array(size).fill(null));
    const reserved = Array.from({length: size}, () => Array(size).fill(false));

    // Place finder patterns
    function placeFinder(row, col) {
        for (let r = -1; r <= 7; r++) {
            for (let c = -1; c <= 7; c++) {
                const y = row + r, x = col + c;
                if (y < 0 || y >= size || x < 0 || x >= size) continue;
                if (r >= 0 && r <= 6 && c >= 0 && c <= 6) {
                    const isBorder = r === 0 || r === 6 || c === 0 || c === 6;
                    const isInner = r >= 2 && r <= 4 && c >= 2 && c <= 4;
                    matrix[y][x] = isBorder || isInner;
                } else {
                    matrix[y][x] = false;
                }
                reserved[y][x] = true;
            }
        }
    }
    placeFinder(0, 0);
    placeFinder(0, size - 7);
    placeFinder(size - 7, 0);

    // Timing patterns
    for (let i = 8; i < size - 8; i++) {
        if (!reserved[6][i]) { matrix[6][i] = i % 2 === 0; reserved[6][i] = true; }
        if (!reserved[i][6]) { matrix[i][6] = i % 2 === 0; reserved[i][6] = true; }
    }

    // Alignment patterns (ver >= 2)
    if (ver >= 2) {
        const positions = getAlignmentPositions(ver);
        for (const r of positions) {
            for (const c of positions) {
                if (reserved[r] && reserved[r][c]) continue;
                for (let dr = -2; dr <= 2; dr++) {
                    for (let dc = -2; dc <= 2; dc++) {
                        const y = r + dr, x = c + dc;
                        if (y >= 0 && y < size && x >= 0 && x < size && !reserved[y][x]) {
                            matrix[y][x] = Math.abs(dr) === 2 || Math.abs(dc) === 2 || (dr === 0 && dc === 0);
                            reserved[y][x] = true;
                        }
                    }
                }
            }
        }
    }

    // Reserve format info areas
    for (let i = 0; i < 8; i++) {
        if (!reserved[8][i]) { reserved[8][i] = true; matrix[8][i] = false; }
        if (!reserved[i][8]) { reserved[i][8] = true; matrix[i][8] = false; }
        if (!reserved[8][size - 1 - i]) { reserved[8][size - 1 - i] = true; matrix[8][size - 1 - i] = false; }
        if (!reserved[size - 1 - i][8]) { reserved[size - 1 - i][8] = true; matrix[size - 1 - i][8] = false; }
    }
    if (!reserved[8][8]) { reserved[8][8] = true; matrix[8][8] = false; }
    // Dark module
    matrix[size - 8][8] = true; reserved[size - 8][8] = true;

    // Reserve version info (ver >= 7)
    if (ver >= 7) {
        for (let i = 0; i < 6; i++) {
            for (let j = 0; j < 3; j++) {
                reserved[i][size - 11 + j] = true; matrix[i][size - 11 + j] = false;
                reserved[size - 11 + j][i] = true; matrix[size - 11 + j][i] = false;
            }
        }
    }

    // Encode data
    const eccInfo = getEccInfo(ver);
    const dataBytes = encodeDataBytes(data, ver, eccInfo.totalData);
    const eccBytes = computeECC(dataBytes, eccInfo);
    const allBits = toBitstream(dataBytes, eccBytes, eccInfo);

    // Place data bits
    let bitIdx = 0;
    let upward = true;
    for (let right = size - 1; right >= 0; right -= 2) {
        if (right === 6) right = 5; // skip timing column
        const rows = upward ? Array.from({length: size}, (_, i) => size - 1 - i) : Array.from({length: size}, (_, i) => i);
        for (const row of rows) {
            for (let c = 0; c < 2; c++) {
                const col = right - c;
                if (col < 0 || reserved[row][col]) continue;
                matrix[row][col] = bitIdx < allBits.length ? allBits[bitIdx++] === 1 : false;
            }
        }
        upward = !upward;
    }

    // Apply best mask
    let bestMask = 0, bestScore = Infinity;
    for (let m = 0; m < 8; m++) {
        const masked = applyMask(matrix, reserved, m, size);
        const score = scoreMask(masked, size);
        if (score < bestScore) { bestScore = score; bestMask = m; }
    }
    const final = applyMask(matrix, reserved, bestMask, size);

    // Write format info
    writeFormatInfo(final, bestMask, size);
    if (ver >= 7) writeVersionInfo(final, ver, size);

    return final;
}

function getAlignmentPositions(ver) {
    if (ver === 1) return [];
    const table = [
        [], [6,18], [6,22], [6,26], [6,30], [6,34],
        [6,22,38], [6,24,42], [6,26,46], [6,28,50], [6,30,54],
        [6,32,58], [6,34,62], [6,26,46,66], [6,26,48,70], [6,26,50,74],
        [6,30,54,78], [6,30,56,82], [6,30,58,86], [6,34,62,90]
    ];
    return table[ver - 1] || [];
}

function getEccInfo(ver) {
    // ECC level M parameters: [totalCodewords, eccPerBlock, numBlocks1, dataPerBlock1, numBlocks2, dataPerBlock2]
    const eccM = [
        null,
        [26,10,1,16,0,0],[44,16,1,28,0,0],[70,26,1,44,0,0],[100,18,2,32,0,0],
        [134,24,2,43,0,0],[172,16,4,27,0,0],[196,18,4,31,0,0],[242,22,2,38,2,39],
        [292,22,3,36,2,37],[346,26,4,43,1,44],[404,30,1,50,4,51],[466,22,6,36,2,37],
        [532,22,8,37,1,38],[581,24,4,40,5,41],[655,24,5,41,5,42],[733,28,7,45,3,46],
        [815,28,10,46,1,47],[901,26,9,43,4,44],[991,26,3,44,11,45],[1085,28,3,41,13,42]
    ];
    const e = eccM[ver];
    if (!e) return null;
    const totalData = e[2] * e[3] + e[4] * e[5];
    return {
        totalCodewords: e[0], eccPerBlock: e[1],
        blocks1: e[2], data1: e[3], blocks2: e[4], data2: e[5],
        totalData
    };
}

function encodeDataBytes(data, ver, capacity) {
    const bits = [];
    // Mode: byte (0100)
    bits.push(0, 1, 0, 0);
    // Character count (8 bits for ver 1-9, 16 bits for ver 10+)
    const ccBits = ver <= 9 ? 8 : 16;
    for (let i = ccBits - 1; i >= 0; i--) bits.push((data.length >> i) & 1);
    // Data
    for (const byte of data) {
        for (let i = 7; i >= 0; i--) bits.push((byte >> i) & 1);
    }
    // Terminator
    const totalBits = capacity * 8;
    for (let i = 0; i < 4 && bits.length < totalBits; i++) bits.push(0);
    // Pad to byte
    while (bits.length % 8 !== 0) bits.push(0);
    // Pad bytes
    const padBytes = [0xEC, 0x11];
    let pi = 0;
    while (bits.length < totalBits) {
        for (let i = 7; i >= 0; i--) bits.push((padBytes[pi] >> i) & 1);
        pi = (pi + 1) % 2;
    }
    // Convert to bytes
    const bytes = [];
    for (let i = 0; i < bits.length; i += 8) {
        let b = 0;
        for (let j = 0; j < 8; j++) b = (b << 1) | (bits[i + j] || 0);
        bytes.push(b);
    }
    return bytes;
}

function computeECC(dataBytes, info) {
    const blocks = [];
    let offset = 0;
    for (let i = 0; i < info.blocks1; i++) {
        blocks.push(dataBytes.slice(offset, offset + info.data1));
        offset += info.data1;
    }
    for (let i = 0; i < info.blocks2; i++) {
        blocks.push(dataBytes.slice(offset, offset + info.data2));
        offset += info.data2;
    }
    const eccBlocks = blocks.map(block => rsEncode(block, info.eccPerBlock));
    return { dataBlocks: blocks, eccBlocks };
}

function toBitstream(dataBytes, ecc, info) {
    const { dataBlocks, eccBlocks } = ecc;
    const interleaved = [];
    const maxData = Math.max(info.data1, info.data2);
    for (let i = 0; i < maxData; i++) {
        for (const block of dataBlocks) {
            if (i < block.length) interleaved.push(block[i]);
        }
    }
    for (let i = 0; i < info.eccPerBlock; i++) {
        for (const block of eccBlocks) {
            if (i < block.length) interleaved.push(block[i]);
        }
    }
    const bits = [];
    for (const byte of interleaved) {
        for (let i = 7; i >= 0; i--) bits.push((byte >> i) & 1);
    }
    return bits;
}

// Reed-Solomon over GF(256)
const GF_EXP = new Array(512);
const GF_LOG = new Array(256);
(function initGF() {
    let x = 1;
    for (let i = 0; i < 255; i++) {
        GF_EXP[i] = x;
        GF_LOG[x] = i;
        x <<= 1;
        if (x >= 256) x ^= 0x11D;
    }
    for (let i = 255; i < 512; i++) GF_EXP[i] = GF_EXP[i - 255];
})();

function gfMul(a, b) {
    if (a === 0 || b === 0) return 0;
    return GF_EXP[GF_LOG[a] + GF_LOG[b]];
}

function rsEncode(data, eccCount) {
    // Generator polynomial
    let gen = [1];
    for (let i = 0; i < eccCount; i++) {
        const newGen = new Array(gen.length + 1).fill(0);
        for (let j = 0; j < gen.length; j++) {
            newGen[j] ^= gen[j];
            newGen[j + 1] ^= gfMul(gen[j], GF_EXP[i]);
        }
        gen = newGen;
    }
    const msg = data.concat(new Array(eccCount).fill(0));
    for (let i = 0; i < data.length; i++) {
        const coef = msg[i];
        if (coef !== 0) {
            for (let j = 0; j < gen.length; j++) {
                msg[i + j] ^= gfMul(gen[j], coef);
            }
        }
    }
    return msg.slice(data.length);
}

function applyMask(matrix, reserved, mask, size) {
    const result = matrix.map(r => [...r]);
    for (let r = 0; r < size; r++) {
        for (let c = 0; c < size; c++) {
            if (reserved[r][c]) continue;
            let flip = false;
            switch (mask) {
                case 0: flip = (r + c) % 2 === 0; break;
                case 1: flip = r % 2 === 0; break;
                case 2: flip = c % 3 === 0; break;
                case 3: flip = (r + c) % 3 === 0; break;
                case 4: flip = (Math.floor(r/2) + Math.floor(c/3)) % 2 === 0; break;
                case 5: flip = (r*c)%2 + (r*c)%3 === 0; break;
                case 6: flip = ((r*c)%2 + (r*c)%3) % 2 === 0; break;
                case 7: flip = ((r+c)%2 + (r*c)%3) % 2 === 0; break;
            }
            if (flip) result[r][c] = !result[r][c];
        }
    }
    return result;
}

function scoreMask(matrix, size) {
    let score = 0;
    // Rule 1: consecutive same-color in rows/cols
    for (let r = 0; r < size; r++) {
        let count = 1;
        for (let c = 1; c < size; c++) {
            if (matrix[r][c] === matrix[r][c-1]) { count++; }
            else { if (count >= 5) score += count - 2; count = 1; }
        }
        if (count >= 5) score += count - 2;
    }
    for (let c = 0; c < size; c++) {
        let count = 1;
        for (let r = 1; r < size; r++) {
            if (matrix[r][c] === matrix[r-1][c]) { count++; }
            else { if (count >= 5) score += count - 2; count = 1; }
        }
        if (count >= 5) score += count - 2;
    }
    return score;
}

function writeFormatInfo(matrix, mask, size) {
    // ECC level M = 0b00, mask pattern
    const formatBits = (0b00 << 3) | mask;
    let fmt = formatBits;
    // BCH encoding for format info
    let rem = fmt << 10;
    for (let i = 4; i >= 0; i--) {
        if (rem & (1 << (i + 10))) rem ^= 0x537 << i;
    }
    const encoded = ((fmt << 10) | rem) ^ 0x5412;

    const bits = [];
    for (let i = 14; i >= 0; i--) bits.push((encoded >> i) & 1);

    // Place format bits
    const positions1 = [[8,0],[8,1],[8,2],[8,3],[8,4],[8,5],[8,7],[8,8],[7,8],[5,8],[4,8],[3,8],[2,8],[1,8],[0,8]];
    const positions2 = [];
    for (let i = 0; i < 7; i++) positions2.push([size - 1 - i, 8]);
    for (let i = 7; i < 15; i++) positions2.push([8, size - 15 + i]);

    for (let i = 0; i < 15; i++) {
        matrix[positions1[i][0]][positions1[i][1]] = bits[i] === 1;
        matrix[positions2[i][0]][positions2[i][1]] = bits[i] === 1;
    }
}

function writeVersionInfo(matrix, ver, size) {
    if (ver < 7) return;
    let rem = ver;
    for (let i = 11; i >= 0; i--) {
        if (rem & (1 << (i + 6))) rem ^= 0x1F25 << (i - 6 >= 0 ? i - 6 : 0);
    }
    // Simplified: skip version info for now (only needed ver >= 7)
}

// ============================================================
// Page Router
// ============================================================
(async function main() {
    const path = window.location.pathname;
    const shareMatch = path.match(/^\/share\/(d|r)\/(.+)$/);

    if (shareMatch) {
        const type = shareMatch[1]; // 'd' or 'r'
        const npub = shareMatch[2];
        document.getElementById('share-page').classList.remove('hidden');
        await renderSharePage(type, npub);
    } else {
        document.getElementById('not-found').classList.remove('hidden');
    }
})();

async function renderSharePage(type, npub) {
    const isDriver = type === 'd';
    document.title = `RoadFlare — ${isDriver ? 'Driver' : 'Rider'} Profile`;

    // Decode npub
    const hexPubkey = npubToHex(npub);
    if (!hexPubkey) {
        showError('Invalid profile link', 'The npub in this URL could not be decoded. Check that the full link was copied correctly.');
        return;
    }

    // Fetch from relays
    const profile = await fetchKind0(hexPubkey);
    if (!profile) {
        showError('Profile not found', 'Could not load this profile from Nostr relays. The relays may be temporarily unavailable, or this profile has not been published yet.');
        return;
    }

    // Hide loading, show profile
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('profile').classList.remove('hidden');

    // Populate
    const name = profile.display_name || profile.name || npub.slice(0, 16) + '...';
    document.getElementById('profile-name').textContent = name;
    document.getElementById('profile-npub').textContent = npub;

    // Type badge
    const typeEl = document.getElementById('profile-type');
    typeEl.textContent = isDriver ? 'Driver' : 'Rider';
    typeEl.classList.add(isDriver ? 'type-driver' : 'type-rider');

    // Avatar
    if (profile.picture) {
        const avatarEl = document.getElementById('profile-avatar');
        const img = document.createElement('img');
        img.src = profile.picture;
        img.alt = name;
        img.onerror = () => { img.remove(); };
        avatarEl.innerHTML = '';
        avatarEl.appendChild(img);
    }

    // Banner
    if (profile.banner) {
        document.getElementById('profile-banner').style.backgroundImage = `url(${profile.banner})`;
    }

    // About
    if (profile.about) {
        const aboutEl = document.getElementById('profile-about');
        aboutEl.textContent = profile.about;
        aboutEl.classList.remove('hidden');
    }

    // Vehicle (drivers only)
    if (isDriver) {
        const parts = [profile.car_color, profile.car_year, profile.car_make, profile.car_model].filter(Boolean);
        if (parts.length > 0) {
            document.getElementById('vehicle-value').textContent = parts.join(' ');
            document.getElementById('vehicle-info').classList.remove('hidden');
        }
    }

    // QR code
    const pageUrl = window.location.href;
    try {
        generateQR(pageUrl, document.getElementById('qr-canvas'), 160);
    } catch (_) {}

    // Deep link
    document.getElementById('add-btn').href = 'nostr:' + npub;

    // Store links (placeholders)
    document.getElementById('appstore-btn').href = '#';
    document.getElementById('appstore-btn').textContent = 'App Store (coming soon)';
    document.getElementById('playstore-btn').href = '#';
    document.getElementById('playstore-btn').textContent = 'Google Play (coming soon)';
}

function showError(title, msg) {
    document.getElementById('loading').classList.add('hidden');
    const errorEl = document.getElementById('error');
    errorEl.classList.remove('hidden');
    document.getElementById('error-title').textContent = title;
    document.getElementById('error-msg').textContent = msg;
}
